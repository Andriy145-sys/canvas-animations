<!DOCTYPE html>
<html>
  <head> 
    <meta charset="UTF-8"> 
    <title>Анімація canvas</title> 
  </head> 
  <body> 
    <canvas id="myCanvas" width="530" height="80" style="border-style: outset";> 
  </body> 
</html>
<script>
        let x =  0;
        let y = 15;
        let speed = 5;

function animate() {

    reqAnimFrame = window.mozRequestAnimationFrame    ||
                window.webkitRequestAnimationFrame ||
                window.msRequestAnimationFrame     ||
                window.oRequestAnimationFrame
                ;

    reqAnimFrame(animate);

    x += speed;

    if(x <= 0 || x >= 475){
        speed = -speed;
    }

    draw();
}


function draw() {
    var canvas  = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, 530, 170);
    ctx.fillStyle = "green";
    ctx.fillRect(x, y, 50, 50);
}

animate();
</script>
